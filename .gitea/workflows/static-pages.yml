name: Publish to gitea.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: gitea-io
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        shell: bash
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          set -euo pipefail

          git init .
          git remote add origin "http://x-access-token:${GITEA_TOKEN}@nowwhat.stat.unipd.it/gitea/${{ gitea.repository }}.git"
          git fetch --prune --tags origin "+refs/heads/*:refs/remotes/origin/*"
          git checkout --force "${{ gitea.sha }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build static site
        shell: bash
        env:
          NEXT_PUBLIC_GOOGLE_ANALYTICS_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_ANALYTICS_ID }}
        run: |
          set -euo pipefail

          OWNER="${{ gitea.repository_owner }}"
          REPO="$(basename "${{ gitea.repository }}")"
          export BASE_PATH="/gitea.io/${OWNER}/${REPO}"
          export SITE_URL="https://nowwhat.stat.unipd.it${BASE_PATH}"

          node -e '
            const fs = require("fs");
            const path = "src/config/config.json";
            const config = JSON.parse(fs.readFileSync(path, "utf8"));
            config.site.base_url = process.env.SITE_URL;
            config.site.base_path = process.env.BASE_PATH;
            fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          '

          npm run build:static

      - name: Install rsync
        run: |
          apt-get update
          apt-get install -y rsync

      - name: Publish to gitea.io
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${{ gitea.repository_owner }}"
          REPO="$(basename "${{ gitea.repository }}")"
          TARGET="/volume1/web/gitea.io/${OWNER}/${REPO}"

          echo "Publishing to ${TARGET}"

          mkdir -p "${TARGET}"

          rsync -av --delete \
            out/ "${TARGET}/"

          echo "Published at https://nowwhat.stat.unipd.it/gitea.io/${OWNER}/${REPO}/"
